spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/zdrive_db}
spring.datasource.username=${DB_USERNAME:zdrive_user}
spring.datasource.password=${DB_PASSWORD:zdrive_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

zdrive.admin.password=${ADMIN_PASSWORD:zdrive_admin_123}
